# (Optional) You can remove this line to avoid the warning on Heroku:
# user root;

worker_processes 1;
worker_rlimit_nofile 4096;

error_log /dev/stderr warn;

events {
    worker_connections 512;
    use epoll;
    multi_accept on;
}

http {
    access_log /dev/stdout;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Define the $connection_upgrade variable used below
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ───────── 1) Redirect herokuapp host -> canonical domain ─────────
    server {
        listen $PORT;
        listen [::]:$PORT;
        server_name ~\.herokuapp\.com$;
        return 301 $NEXT_PUBLIC_API_URL$request_uri;
    }

    # ───────── 2) App server for the canonical domain ─────────
    server {
        listen $PORT default_server;
        listen [::]:$PORT default_server;

        client_max_body_size 50m;

        # ───── Proxy tiler (Tile Server) ─────
        location /tiler {
            proxy_pass http://localhost:8000;

            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP         $remote_addr;

            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;

            proxy_redirect off;
        }

        # ───── Proxy Admin UI & Next.js Frontend ─────
        location / {
            proxy_pass http://localhost:3000;

            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP         $remote_addr;

            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;

            proxy_redirect off;
        }
    }
}
